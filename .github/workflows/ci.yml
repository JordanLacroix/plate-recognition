name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Sécurité: GITHUB_TOKEN en lecture seule par défaut (moindre privilège).
permissions:
  contents: read

# Annule les runs superflus (économie + surface d'attaque réduite).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & types (ruff + mypy)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (léger — mypy résout les stubs manquants via ignore_missing_imports)
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy numpy pydantic pyyaml
      - name: Ruff
        run: ruff check anpr_poc eval tests
      - name: Mypy (strict)
        run: mypy anpr_poc

  tests:
    name: Tests (cœur + intégration)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false   # pas de token git laissé dans le workspace
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (léger — fakes, pas de modèle)
        run: |
          python -m pip install --upgrade pip
          pip install numpy pydantic pyyaml "opencv-python-headless>=4.9,<6" pytest
      - name: Pytest
        run: python -m pytest tests/ -q

  licenses:
    name: Contrôle de licences (aucune AGPL)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install projet complet
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pip-licenses
      - name: Échec si AGPL / GPL fort dans l'arbre de dépendances
        run: bash scripts/check_licenses.sh

  security:
    name: Sécurité (CVE deps + cohérence)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install projet + outils
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pip-audit
      - name: Audit vulnérabilités (pip-audit / base PyPA)
        # Informatif en POC: un CVE amont ne bloque pas la PR mais reste visible.
        # À passer bloquant (retirer continue-on-error) avant mise en service.
        continue-on-error: true
        run: pip-audit --desc --progress-spinner off
      - name: Cohérence des dépendances
        run: pip check
