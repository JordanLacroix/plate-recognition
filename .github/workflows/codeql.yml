name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"   # lundi 06:00 UTC — détecte les nouvelles règles sur code figé

permissions:
  contents: read

jobs:
  analyze:
    name: Analyse statique (SAST)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write   # publier les alertes dans l'onglet Security
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-and-quality
      - uses: github/codeql-action/analyze@v3
